services:
  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vyntrise-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: vyntrise_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vyntrise-auth-net

  # ── Express Backend ──────────────────────────────────────────
  backend:
    image: ghcr.io/reviewrise/vyntrise-auth-backend:latest
    container_name: vyntrise-auth-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/vyntrise_auth?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3021
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://auth.vyntrise.com}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL:-https://auth.vyntrise.com}
    ports:
      - "3021:3021"
    networks:
      - vyntrise-auth-net

  # ── Next.js Frontend ────────────────────────────────────────
  frontend:
    image: ghcr.io/reviewrise/vyntrise-auth-frontend:latest
    container_name: vyntrise-auth-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://auth.vyntrise.com/api}
      PORT: 3002
    ports:
      - "3002:3002"
    networks:
      - vyntrise-auth-net

volumes:
  postgres_data:

networks:
  vyntrise-auth-net:
    driver: bridge
