services:
  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vyntrise-auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: vyntrise_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vyntrise-auth-net

  # ── Express Backend ──────────────────────────────────────────
  backend:
    image: ghcr.io/reviewrise/vyntrise-auth-backend:latest
    container_name: vyntrise-auth-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/vyntrise_auth?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3010
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://auth.vyntrise.com}
    networks:
      - vyntrise-auth-net

  # ── Next.js Frontend ────────────────────────────────────────
  frontend:
    image: ghcr.io/reviewrise/vyntrise-auth-frontend:latest
    container_name: vyntrise-auth-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://auth.vyntrise.com/api}
    networks:
      - vyntrise-auth-net

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: vyntrise-auth-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/auth.vyntrise.com.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks:
      - vyntrise-auth-net

  # ── Certbot (SSL certificate renewal) ────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: vyntrise-auth-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"

volumes:
  postgres_data:
  certbot_www:
  certbot_conf:

networks:
  vyntrise-auth-net:
    driver: bridge

