name: CI/CD — Vyntrise Auth

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/reviewrise/vyntrise-auth-backend
  IMAGE_FRONTEND: ghcr.io/reviewrise/vyntrise-auth-frontend

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Lint & Type-check
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root deps
        run: npm install

      - name: Install backend deps
        run: npm install
        working-directory: apps/backend

      - name: Install frontend deps
        run: npm install
        working-directory: apps/frontend

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: apps/backend

      - name: Type-check backend
        run: npx tsc --noEmit --skipLibCheck
        working-directory: apps/backend

      - name: Type-check frontend
        run: npx tsc --noEmit
        working-directory: apps/frontend

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Build & Push Docker Images (only on master push)
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Deploy to Server via SSH
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            DEPLOY_DIR="$HOME/vyntrise-auth"

            # Clone repo on first deployment if directory doesn't exist
            if [ ! -d "$DEPLOY_DIR" ]; then
              git clone https://github.com/REVIEWRISE/vyntrise-auth.git "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"

            # Pull latest changes
            git pull origin master

            # Write .env file with all secrets
            cat > .env <<EOF
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            NODE_ENV=production
            NEXT_PUBLIC_API_URL=https://auth.vyntrise.com/api
            ALLOWED_ORIGINS=https://auth.vyntrise.com
            EMAIL_PROVIDER=${{ secrets.EMAIL_PROVIDER }}
            GMAIL_USER=${{ secrets.GMAIL_USER }}
            GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            EOF

            # Log in to GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose pull

            # Restart services
            docker compose up -d --remove-orphans

            # Note: DB migrations run automatically on backend startup (see Dockerfile CMD)

            # Clean up old images
            docker image prune -f

            echo "✅ Deployment complete!"
