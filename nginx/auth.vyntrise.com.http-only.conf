# ── HTTP only (used BEFORE SSL cert is issued) ──────────────────
# After running scripts/init-ssl.sh, this file is replaced by
# auth.vyntrise.com.conf which includes the HTTPS block.

server {
    listen 80;
    server_name auth.vyntrise.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy everything else to frontend while HTTP-only
    location / {
        proxy_pass         http://frontend:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        
        # Timeout settings for Next.js
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    location /api/ {
        proxy_pass         http://backend:3021/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        
        # Timeout settings
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
        
        # Buffer settings
        proxy_buffering       off;
        proxy_buffer_size     4k;
        proxy_buffers         8 4k;
        proxy_busy_buffers_size 8k;
    }
}
